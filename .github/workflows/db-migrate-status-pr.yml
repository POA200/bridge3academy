name: Prisma Migration Status (PR)

on:
  pull_request:
    branches:
      - main
    paths:
      - packages/db/prisma/**
      - packages/db/prisma.config.ts
      - packages/db/package.json
      - package-lock.json
      - .github/workflows/db-migrate-status-pr.yml
  workflow_dispatch:

jobs:
  migration-status:
    name: Check prisma migrate status
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Check migration status
        run: npm run migrate:status --workspace @repo/db
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
